<div class="elementor-widget elementor-widget-form"><div class="elementor-widget-container">
<form id="rsContactForm" class="elementor-form" method="post" name="Contact Form">
<div class="elementor-form-fields-wrapper elementor-labels-above">
<div class="elementor-field-type-text elementor-field-group elementor-column elementor-col-100 elementor-field-required">
<label for="rs-f-name" class="elementor-field-label">お名前（必須）</label>

<div class="elementor-field-group elementor-column elementor-field-type-submit elementor-col-100 e-form__buttons">

<p class="rs-contact-sent" id="rsContactMsg" hidden>送信しました。お問い合わせありがとうございます。</p>
</div></div></div>
<script>
(function () {
  var f = document.getElementById("rsContactForm");
  if (!f) return;
  f.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!f.checkValidity()) { f.reportValidity(); return; }
    var btn = f.querySelector('[type="submit"]');
    if (btn) btn.disabled = true;
    fetch("https://script.google.com/macros/s/AKfycbxTKoGPg1NE3kc8xbmjHz4QBx9VLU1ZGyJ07Tol5VJ5hkqTx4-GN2n_TigZLm8MeDa8/exec", {
      method: "POST", mode: "no-cors", body: new FormData(f)
    }).then(function () {
      var m = document.getElementById("rsContactMsg"); if (m) m.hidden = false;
      f.reset();
    }).catch(function () {
      if (btn) btn.disabled = false;
      alert("送信に失敗しました。時間をおいて再度お試しください。");
    });
  });
})();
</script>
