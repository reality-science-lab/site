<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>プレスリリース v0.5 — 現実科学研究所 v1</title>
  <meta name="description" content="現実科学研究所 設立に関するプレスリリース v0.5（ドラフト）— 紙・墨・朱・燐光 版。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/v1-tokens.css" />
  <link rel="stylesheet" href="../styles/v1-doc.css" />
</head>
<body>
  <header class="docbar">
    <div class="brand">
      <span class="mark">⌖</span>
      <span>現実科学研究所</span>
      <span style="opacity:.45">· v1</span>
    </div>
    <nav>
      <a href="../">LP</a>
      <a href="../manifesto/">趣意書</a>
      <a href="./" class="active">リリース</a>
    </nav>
  </header>

  <div class="draft-banner">
    <strong>DRAFT v0.5</strong> ／ Press Release — 配信前の最終確認段階
  </div>

  <main class="doc-wrap">
    <div class="doc-meta">
      <span>§ PRESS</span>
      <span>報道発表用ドラフト</span>
      <span>v0.5 ／ 2026.05</span>
    </div>
    <article id="doc" class="loading"></article>
  </main>

  <footer class="doc-foot">
    <span>⌖ 現実科学研究所 ／ Reality Science Institute</span>
    <span>EST. 2026.07 — © 2026 RSI</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    fetch('../../data/press.md')
      .then(r => r.text())
      .then(md => {
        const el = document.getElementById('doc');
        el.innerHTML = marked.parse(md);
        el.classList.remove('loading');
      })
      .catch(err => {
        document.getElementById('doc').innerHTML =
          '<p style="color:var(--shu)">読み込みに失敗しました：' + err.message + '</p>';
      });
  </script>
</body>
</html>
