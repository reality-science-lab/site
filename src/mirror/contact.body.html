<h1>お問い合わせ</h1>
<p><span style="font-weight: 400;">現実科学ラボに関する問い合わせは下記フォームからお願いします。</span></p>
<p>&nbsp;</p>
<div role="form" class="rs-contact" id="rs-contact-f57" lang="ja" dir="ltr">
<form id="rsContactForm" class="wpcf7-form" novalidate="novalidate">
<p><label> お名前 (必須)<br />
    <span class="wpcf7-form-control-wrap your-name"><input type="text" name="name" value="" size="40" class="wpcf7-form-control wpcf7-text" required aria-required="true" /></span> </label></p>
<p><label> メールアドレス (必須)<br />
    <span class="wpcf7-form-control-wrap your-email"><input type="email" name="email" value="" size="40" class="wpcf7-form-control wpcf7-text wpcf7-email" required aria-required="true" /></span> </label></p>
<p><label> 題名<br />
    <span class="wpcf7-form-control-wrap your-subject"><input type="text" name="subject" value="" size="40" class="wpcf7-form-control wpcf7-text" /></span> </label></p>
<p><label> メッセージ本文<br />
    <span class="wpcf7-form-control-wrap your-message"><textarea name="message" cols="40" rows="10" class="wpcf7-form-control wpcf7-textarea"></textarea></span> </label></p>
<input type="hidden" name="_source" value="トップページ CONTACT" />
<p><input type="submit" value="送信" class="wpcf7-form-control wpcf7-submit" /></p>
<p class="rs-contact-sent" id="rsContactMsg" hidden>送信しました。お問い合わせありがとうございます。</p>
</form></div>
<script>
(function () {
  var f = document.getElementById("rsContactForm");
  if (!f) return;
  f.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!f.checkValidity()) { f.reportValidity(); return; }
    var btn = f.querySelector('[type="submit"]');
    if (btn) btn.disabled = true;
    fetch("https://script.google.com/macros/s/AKfycbxTKoGPg1NE3kc8xbmjHz4QBx9VLU1ZGyJ07Tol5VJ5hkqTx4-GN2n_TigZLm8MeDa8/exec", {
      method: "POST", mode: "no-cors", body: new FormData(f)
    }).then(function () {
      var m = document.getElementById("rsContactMsg"); if (m) m.hidden = false;
      f.reset();
    }).catch(function () {
      if (btn) btn.disabled = false;
      alert("送信に失敗しました。時間をおいて再度お試しください。");
    });
  });
})();
</script>
